<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Room</title>
</head>
<body>
  <h2>Join a Room</h2>

  <label>Room ID</label><br/>
  <input id="room-id" type="text" placeholder="e.g. X7K-29A" autocomplete="off"/><br/><br/>

  <button id="btn-join">Join Room</button>
  <p id="msg"></p>

  <br/>
  <a href="/create-room.html">Create a new room instead</a>

  <script type="module">
    import { joinRoom }         from "../firebase/roomService.js";
    import { waitForAuthReady } from "../session.js";

    async function init() {
      const user = await waitForAuthReady();
      if (!user) { window.location.href = "/index.html"; return; }

      const params = new URLSearchParams(window.location.search);
      if (params.get("room")) document.getElementById("room-id").value = params.get("room");

      document.getElementById("btn-join").onclick = async () => {
        const roomId = document.getElementById("room-id").value.trim().toUpperCase();
        if (!roomId) { document.getElementById("msg").textContent = "Enter a Room ID."; return; }

        document.getElementById("btn-join").disabled = true;
        document.getElementById("msg").textContent = "Joining…";

        const { room, error } = await joinRoom({
          roomId,
          uid:         user.uid,
          displayName: user.displayName ?? user.email,
        });

        document.getElementById("btn-join").disabled = false;

        if (error) {
          document.getElementById("msg").textContent = `Error: ${error}`;
        } else {
          window.location.href = `/editor.html?room=${roomId}`;
        }
      };
    }

    init();
  </script>
</body>
</html>
