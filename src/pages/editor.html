<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    #header { padding: 8px 12px; border-bottom: 1px solid #ccc; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    /* ── Main 3-column layout ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Left sidebar: channels + members ── */
    #sidebar-left { width: 160px; border-right: 1px solid #ccc; display: flex; flex-direction: column; padding: 8px; gap: 4px; overflow-y: auto; flex-shrink: 0; }
    .ch-btn { text-align: left; padding: 5px 8px; cursor: pointer; border: none; background: none; font-family: monospace; font-size: 12px; border-radius: 4px; width: 100%; }
    .ch-btn.active { background: #eee; font-weight: bold; }
    #members-section { margin-top: 12px; }
    #members-list { font-size: 11px; margin-top: 4px; line-height: 1.8; }

    /* ── Chat area (center) ── */
    #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid #ccc; min-width: 0; }
    #channel-header { padding: 6px 12px; border-bottom: 1px solid #eee; font-size: 13px; color: #555; flex-shrink: 0; }
    #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .msg { display: flex; gap: 8px; align-items: flex-start; }
    .avatar { width: 26px; height: 26px; border-radius: 50%; background: #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .msg-meta { font-size: 11px; color: #888; }
    .msg-meta strong { color: #333; margin-right: 6px; }
    .msg-text { font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    #input-area { padding: 8px 12px; border-top: 1px solid #ccc; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    #typing-indicator { font-size: 11px; color: #888; min-height: 14px; }
    #input-row { display: flex; gap: 6px; }
    #msg-input { flex: 1; padding: 7px 10px; font-family: monospace; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; resize: none; }
    #btn-send { padding: 7px 14px; cursor: pointer; font-family: monospace; font-size: 13px; }

    /* ── Right panel: file explorer + code editor ── */
    #panel-right { width: 420px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }

    /* file explorer */
    #file-explorer { border-bottom: 1px solid #ccc; display: flex; flex-direction: column; }
    #file-explorer-header { padding: 6px 10px; font-size: 11px; color: #888; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    #file-tree { overflow-y: auto; max-height: 200px; }
    .file-item { padding: 4px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-item:hover { background: #f5f5f5; }
    .file-item.active { background: #eee; font-weight: bold; }
    .file-item.folder { color: #888; cursor: default; font-size: 11px; padding: 6px 10px 2px; }
    #no-files { padding: 12px 10px; font-size: 12px; color: #aaa; }

    /* code editor */
    #code-editor-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #code-editor-header { padding: 6px 10px; font-size: 11px; color: #555; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    #code-editor { flex: 1; width: 100%; border: none; outline: none; padding: 10px; font-family: monospace; font-size: 13px; line-height: 1.6; resize: none; background: #fafafa; overflow-y: auto; }
    #code-editor:disabled { color: #aaa; background: #f5f5f5; }
    #code-status { font-size: 11px; color: #aaa; }

    label { font-size: 11px; color: #888; }
    button { cursor: pointer; font-family: monospace; }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <div id="header">
    <strong id="room-name-display">Loading…</strong>
    &nbsp;|&nbsp; Room ID: <strong id="room-id-display"></strong>
    <button id="btn-copy">Copy ID</button>
    <button id="btn-invite">Copy invite link</button>
    <button id="btn-leave" style="margin-left:auto">Leave</button>
  </div>

  <div id="main">

    <!-- ── Left sidebar ── -->
    <div id="sidebar-left">
      <div style="font-size:11px;color:#888;margin-bottom:2px">CHANNELS</div>
      <div id="channel-list"></div>
      <div id="members-section">
        <div style="font-size:11px;color:#888">ONLINE</div>
        <div id="members-list"></div>
      </div>
    </div>

    <!-- ── Chat ── -->
    <div id="chat-area">
      <div id="channel-header"># …</div>
      <div id="messages"></div>
      <div id="input-area">
        <div id="typing-indicator"></div>
        <div id="input-row">
          <textarea id="msg-input" rows="1" placeholder="Message #channel"></textarea>
          <button id="btn-send">Send</button>
        </div>
      </div>
    </div>

    <!-- ── Right panel: files + code editor ── -->
    <div id="panel-right">

      <!-- File explorer -->
      <div id="file-explorer">
        <div id="file-explorer-header">
          <span>FILES</span>
          <span id="file-count" style="color:#aaa"></span>
        </div>
        <div id="file-tree">
          <div id="no-files">No files uploaded.</div>
        </div>
      </div>

      <!-- Code editor -->
      <div id="code-editor-section">
        <div id="code-editor-header">
          <span id="open-file-name" style="color:#aaa">No file open</span>
          <span id="code-status"></span>
        </div>
        <textarea id="code-editor" disabled placeholder="Select a file to edit…"></textarea>
      </div>

    </div>
  </div>

  <script type="module">
    import { getRoom, subscribeToMembers, leaveRoom }        from "../firebase/roomService.js";
    import { sendMessage, subscribeToMessages,
             setTyping, clearTyping, subscribeToTyping }     from "../firebase/chatService.js";
    import { subscribeToFiles, updateFileContent,
             subscribeToFileContent }                        from "../firebase/fileService.js";
    import { waitForAuthReady }                              from "../session.js";

    // ── State ──────────────────────────────────────────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const roomId  = params.get("room")?.trim().toUpperCase();

    let currentUser       = null;
    let activeChannel     = null;
    let activeFile        = null;   // { id, name, path, content, language }
    let unsubMessages     = null;
    let unsubTyping       = null;
    let unsubMembers      = null;
    let unsubFiles        = null;
    let unsubFileContent  = null;
    let chatTypingTimer   = null;
    let codeDebounceTimer = null;
    let suppressCodeEcho  = false;

    if (!roomId) {
      document.body.innerHTML = `<p>No room ID. <a href="/join-room.html">Join a room</a>.</p>`;
    }

    // ── Init ──────────────────────────────────────────────────────────────
    async function init() {
      currentUser = await waitForAuthReady();
      if (!currentUser) { window.location.href = "/index.html"; return; }

      const { room, error } = await getRoom(roomId);
      if (error || !room) {
        document.body.innerHTML = `<p>Room not found. <a href="/join-room.html">Try again</a>.</p>`;
        return;
      }

      // Header
      document.getElementById("room-name-display").textContent = room.name;
      document.getElementById("room-id-display").textContent   = roomId;
      document.title = room.name;

      document.getElementById("btn-copy").onclick = () => {
        navigator.clipboard.writeText(roomId);
        document.getElementById("btn-copy").textContent = "Copied!";
        setTimeout(() => document.getElementById("btn-copy").textContent = "Copy ID", 1500);
      };
      document.getElementById("btn-invite").onclick = () => {
        navigator.clipboard.writeText(`${location.origin}/join-room.html?room=${roomId}`);
        document.getElementById("btn-invite").textContent = "Copied!";
        setTimeout(() => document.getElementById("btn-invite").textContent = "Copy invite link", 1500);
      };

      // Channels
      renderChannelList(room.channels);
      if (room.channels.length) selectChannel(room.channels[0]);

      // Members
      unsubMembers = subscribeToMembers(roomId, (members) => {
        document.getElementById("members-list").textContent =
          members.map(m => m.displayName).join("\n");
      });

      // Files — live subscribe so newly uploaded files appear instantly
      unsubFiles = subscribeToFiles(roomId, renderFileTree);

      // Leave
      document.getElementById("btn-leave").onclick = async () => {
        cleanup();
        await leaveRoom({ roomId, uid: currentUser.uid });
        window.location.href = "/join-room.html";
      };
    }

    // ══════════════════════════════════════════════════════════════════════
    // FILE EXPLORER
    // ══════════════════════════════════════════════════════════════════════

    function renderFileTree(files) {
      const tree   = document.getElementById("file-tree");
      const noFile = document.getElementById("no-files");

      document.getElementById("file-count").textContent = files.length ? `${files.length} files` : "";

      if (!files.length) {
        tree.innerHTML = "";
        tree.appendChild(noFile);
        return;
      }

      // Group files by top-level folder
      const grouped = {};
      files.forEach(f => {
        const parts  = f.path.split("/");
        const folder = parts.length > 1 ? parts[0] : "";
        if (!grouped[folder]) grouped[folder] = [];
        grouped[folder].push(f);
      });

      tree.innerHTML = "";

      Object.entries(grouped).forEach(([folder, folderFiles]) => {
        // Folder label
        if (folder) {
          const folderEl = document.createElement("div");
          folderEl.className   = "file-item folder";
          folderEl.textContent = `📁 ${folder}`;
          tree.appendChild(folderEl);
        }

        folderFiles.forEach(file => {
          const item = document.createElement("div");
          item.className   = "file-item";
          item.textContent = (folder ? "  " : "") + "📄 " + file.name;
          item.title       = file.path;
          item.dataset.id  = file.id;

          if (activeFile?.id === file.id) item.classList.add("active");

          item.onclick = () => openFile(file);
          tree.appendChild(item);
        });
      });
    }

    // ── Open a file in the code editor ────────────────────────────────────
    function openFile(file) {
      // Tear down previous file subscription
      if (unsubFileContent) unsubFileContent();

      activeFile = file;

      // Update active state in tree
      document.querySelectorAll(".file-item").forEach(el =>
        el.classList.toggle("active", el.dataset.id === file.id));

      document.getElementById("open-file-name").textContent = file.path;
      document.getElementById("code-status").textContent    = "Loading…";

      const editor = document.getElementById("code-editor");
      editor.disabled = false;

      // Subscribe to live edits — falls back to original content if no edits yet
      unsubFileContent = subscribeToFileContent(roomId, file.id, (liveData) => {
        const newContent = liveData ? liveData.content : file.content;

        // Don't overwrite local edits with our own echo
        if (suppressCodeEcho && liveData?.editedBy === currentUser.uid) {
          suppressCodeEcho = false;
          return;
        }

        if (editor.value !== newContent) {
          const pos = editor.selectionStart;
          editor.value = newContent;
          editor.selectionStart = editor.selectionEnd = pos;
        }

        document.getElementById("code-status").textContent =
          liveData
            ? (liveData.editedBy === currentUser.uid ? "Saved" : `Edited by ${liveData.editedBy}`)
            : "Original";
      });
    }

    // ── Code editor input → Firestore (debounced 300ms) ───────────────────
    document.getElementById("code-editor").addEventListener("input", () => {
      if (!activeFile) return;
      document.getElementById("code-status").textContent = "Typing…";

      clearTimeout(codeDebounceTimer);
      codeDebounceTimer = setTimeout(async () => {
        suppressCodeEcho = true;
        const { error } = await updateFileContent({
          roomId,
          fileId:  activeFile.id,
          content: document.getElementById("code-editor").value,
          uid:     currentUser.uid,
        });
        if (error) {
          document.getElementById("code-status").textContent = `Error: ${error}`;
          suppressCodeEcho = false;
        } else {
          document.getElementById("code-status").textContent = "Saved";
        }
      }, 300);
    });

    // ══════════════════════════════════════════════════════════════════════
    // CHAT
    // ══════════════════════════════════════════════════════════════════════

    function renderChannelList(channels) {
      const list = document.getElementById("channel-list");
      list.innerHTML = "";
      channels.forEach((ch) => {
        const btn = document.createElement("button");
        btn.className   = "ch-btn";
        btn.textContent = `# ${ch.name}`;
        btn.dataset.id  = ch.id;
        btn.onclick     = () => selectChannel(ch);
        list.appendChild(btn);
      });
    }

    function selectChannel(ch) {
      if (unsubMessages) unsubMessages();
      if (unsubTyping)   unsubTyping();

      activeChannel = ch;

      document.querySelectorAll(".ch-btn").forEach(b =>
        b.classList.toggle("active", b.dataset.id === ch.id));
      document.getElementById("channel-header").textContent   = `# ${ch.name}`;
      document.getElementById("msg-input").placeholder        = `Message #${ch.name}`;
      document.getElementById("messages").innerHTML           = "";
      document.getElementById("typing-indicator").textContent = "";

      unsubMessages = subscribeToMessages(roomId, ch.id, renderMessages);
      unsubTyping   = subscribeToTyping(roomId, currentUser.uid, (typers) => {
        const el = document.getElementById("typing-indicator");
        el.textContent = !typers.length ? "" :
          typers.length === 1 ? `${typers[0]} is typing…` :
          `${typers.slice(0,-1).join(", ")} and ${typers.at(-1)} are typing…`;
      });
    }

    function renderMessages(messages) {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      messages.forEach((msg) => {
        const el      = document.createElement("div");
        el.className  = "msg";

        const avatarEl    = document.createElement("div");
        avatarEl.className = "avatar";
        if (msg.senderAvatar) {
          const img = document.createElement("img");
          img.src = msg.senderAvatar; img.alt = msg.senderName;
          avatarEl.appendChild(img);
        } else {
          avatarEl.textContent = (msg.senderName?.[0] ?? "?").toUpperCase();
        }

        const body     = document.createElement("div");
        body.className = "msg-body";
        const meta     = document.createElement("div");
        meta.className = "msg-meta";
        meta.innerHTML = `<strong>${escapeHtml(msg.senderName)}</strong>${formatTime(msg.createdAt)}`;
        const text     = document.createElement("div");
        text.className = "msg-text";
        text.textContent = msg.text;

        body.appendChild(meta);
        body.appendChild(text);
        el.appendChild(avatarEl);
        el.appendChild(body);
        container.appendChild(el);
      });
      container.scrollTop = container.scrollHeight;
    }

    async function handleSend() {
      const input = document.getElementById("msg-input");
      const text  = input.value.trim();
      if (!text || !activeChannel) return;
      input.value = "";
      input.style.height = "auto";
      const { error } = await sendMessage({
        roomId,
        channelId:    activeChannel.id,
        text,
        senderId:     currentUser.uid,
        senderName:   currentUser.displayName ?? currentUser.email,
        senderAvatar: currentUser.photoURL ?? null,
      });
      if (error) console.error("[editor] sendMessage:", error);
    }

    document.getElementById("msg-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    document.getElementById("btn-send").onclick = handleSend;

    document.getElementById("msg-input").addEventListener("input", async () => {
      if (!activeChannel) return;
      const el = document.getElementById("msg-input");
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
      await setTyping({ roomId, uid: currentUser.uid, displayName: currentUser.displayName ?? currentUser.email });
      clearTimeout(chatTypingTimer);
      chatTypingTimer = setTimeout(() => clearTyping({ roomId, uid: currentUser.uid }), 3000);
    });

    document.getElementById("msg-input").addEventListener("blur", () =>
      clearTyping({ roomId, uid: currentUser.uid }));

    // ── Helpers ───────────────────────────────────────────────────────────
    function formatTime(date) {
      return date ? date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";
    }
    function escapeHtml(str) {
      return (str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
    function cleanup() {
      [unsubMessages, unsubTyping, unsubMembers, unsubFiles, unsubFileContent]
        .forEach(u => u?.());
    }

    window.addEventListener("beforeunload", () => {
      cleanup();
      clearTyping({ roomId, uid: currentUser?.uid });
    });

    init();
  </script>
</body>
</html>
